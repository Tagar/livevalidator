command:
  - "uvicorn"
  - "backend.app:app"
  - "--workers"
  - "4"

# Allow service principals and jobs to access the app
permissions:
  - service_principal_name: live-validator-runner
    permission_level: CAN_USE

resources:
  - name: run_validation
    description: "Validation job for comparing source and target data"
    job:
      id: ${resources.jobs.run_validation.id}
      permission: CAN_MANAGE_RUN
  
  - name: job_sentinel
    description: "Orchestrator job that schedules and monitors validations"
    job:
      id: ${resources.jobs.job_sentinel.id}
      permission: CAN_MANAGE_RUN

env:
  # Database Configuration
  # Update these values in the Databricks Apps UI under Environment Variables
  - name: DB_DSN
    value: "postgresql://apprunner:beepboop123@instance-bbdc66b7-47d1-48a0-b2bd-20992dfca609.database.cloud.databricks.com:5432/databricks_postgres"
  
  - name: DB_USE_SSL
    value: "true"
  
  # DB_SSL_CA_FILE: Optional. Leave unset to use system default certificates.
  # Only needed if you have a custom CA certificate file.
  # - name: DB_SSL_CA_FILE
  #   value: "path/to/custom-ca.pem"