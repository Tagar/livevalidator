command:
  - "uvicorn"
  - "backend.app:app"
  - "--workers"
  - "4"

env:
  - name: VALIDATION_JOB_ID
    valueFrom: 'run-validation'
  - name: VALIDATION_JOB_SERVERLESS_ID
    valueFrom: 'run-validation-serverless'
  - name: TEST_CONNECTION_JOB_ID
    valueFrom: 'test-connection'
  - name: TEST_CONNECTION_JOB_SERVERLESS_ID
    valueFrom: 'test-connection-serverless'
  - name: LINEAGE_JOB_ID
    valueFrom: 'fetch-lineage'
  - name: "DB_USER"
    valueFrom: "db_user"
  - name: "DB_PASSWORD"
    valueFrom: "db_password" 

# Allow service principals and jobs to access the app
permissions:
  - service_principal_name: live-validator-runner
    permission_level: CAN_USE

resources:
  - name: run_validation
    description: "Validation job for comparing source and target data"
    job:
      id: ${resources.jobs.run_validation.id}
      permission: CAN_MANAGE_RUN
  
  - name: test-connection
    description: "Test connection job (classic compute)"
    job:
      id: ${resources.jobs.test_connection.id}
      permission: CAN_MANAGE_RUN

  - name: test-connection-serverless
    description: "Test connection job (serverless compute)"
    job:
      id: ${resources.jobs.test_connection_serverless.id}
      permission: CAN_MANAGE_RUN

  - name: fetch-lineage
    description: "Job to fetch upstream lineage from Databricks"
    job:
      id: ${resources.jobs.fetch_lineage.id}
      permission: CAN_MANAGE_RUN

  - name: job_sentinel
    description: "Orchestrator job that schedules and monitors validations"
    job:
      id: ${resources.jobs.job_sentinel.id}
      permission: CAN_MANAGE_RUN
  