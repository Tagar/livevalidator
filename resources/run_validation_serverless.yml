resources:
  jobs:
    run_validation_serverless:
      name: "[LiveValidator] ValidationRunner (Serverless)"
      
      tasks:
        - task_key: validate
          notebook_task:
            notebook_path: ../jobs/run_validation.py
          timeout_seconds: 7200
          disable_auto_optimization: true
          environment_key: default
      
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_version}
            dependencies:
              - teradatasql

      max_concurrent_runs: 150
      parameters:
        - name: backend_api_url
          default: ""
        - name: trigger_id
          default: ""
        - name: name
          default: ""
        - name: source_system_name
          default: ""
        - name: target_system_name
          default: ""
        - name: source_table
          default: ""
        - name: target_table
          default: ""
        - name: sql
          default: ""
        - name: watermark_expr
          default: ""
        - name: compare_mode
          default: "except_all"
        - name: pk_columns
          default: ""
        - name: include_columns
          default: ""
        - name: exclude_columns
          default: ""
        - name: options
          default: "{}"

      permissions:
        - level: CAN_MANAGE_RUN
          group_name: users
      
      tags:
        application: live-validator
        component: validation-serverless
