resources:
  jobs:
    test_connection:
      name: "[LiveValidator] TestConnection"
      
      tasks:
        - task_key: test
          notebook_task:
            notebook_path: ../jobs/test_connection.py
          timeout_seconds: 300
          disable_auto_optimization: true
          existing_cluster_id: ${resources.clusters.live_validator_cluster.id}
      
      max_concurrent_runs: 10
      parameters:
        - name: system_name
          default: ""
        - name: backend_api_url
          default: ""

      permissions:
        - level: CAN_MANAGE_RUN
          group_name: users
      
      tags:
        application: live-validator
        component: test-connection
