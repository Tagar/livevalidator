resources:
  jobs:
    test_connection_serverless:
      name: "[LiveValidator] TestConnection (Serverless)"
      
      tasks:
        - task_key: test
          notebook_task:
            notebook_path: ../jobs/test_connection.py
          timeout_seconds: 300
          disable_auto_optimization: true
          environment_key: default
      
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_version}

      max_concurrent_runs: 10
      parameters:
        - name: system_name
          default: ""
        - name: backend_api_url
          default: ""

      permissions:
        - level: CAN_MANAGE_RUN
          group_name: users
      
      tags:
        application: live-validator
        component: test-connection-serverless
